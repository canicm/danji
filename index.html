<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', Arial, sans-serif; background: #f0f4f8; color: #333; min-height: 100vh; }

.header {
  background: linear-gradient(135deg, #1a73e8, #0d47a1);
  color: white;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 16px; font-weight: 700; flex: 1; }
.back-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  display: none;
  white-space: nowrap;
}
.back-btn:hover { background: rgba(255,255,255,0.35); }

.screen { display: none; padding: 16px; max-width: 860px; margin: 0 auto; }
.screen.active { display: block; }

.card {
  background: white;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.card h2 { font-size: 15px; color: #1a73e8; margin-bottom: 14px; font-weight: 700; }

.btn-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 9px;
}
.sel-btn {
  padding: 11px 8px;
  border: 2px solid #e0e0e0;
  border-radius: 9px;
  background: white;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: #444;
  transition: all 0.18s;
  text-align: center;
  line-height: 1.3;
}
.sel-btn:hover { border-color: #1a73e8; color: #1a73e8; background: #e8f0fe; }
.sel-btn.active { border-color: #1a73e8; background: #1a73e8; color: white; }

.proceed-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #1a73e8, #0d47a1);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 6px;
  transition: opacity 0.2s;
}
.proceed-btn:disabled { opacity: 0.38; cursor: not-allowed; }
.proceed-btn:not(:disabled):hover { opacity: 0.88; }

.selected-info {
  background: #e8f0fe;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #1a73e8;
  font-weight: 600;
  margin-bottom: 14px;
}

.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}
.stat-item {
  background: white;
  border-radius: 10px;
  padding: 10px 8px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}
.stat-val { font-size: 19px; font-weight: 700; color: #1a73e8; }
.stat-label { font-size: 11px; color: #888; margin-top: 2px; }

.search-box {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #e0e0e0;
  border-radius: 9px;
  font-size: 14px;
  margin-bottom: 14px;
  transition: border-color 0.2s;
}
.search-box:focus { outline: none; border-color: #1a73e8; }

.table-wrapper { overflow-x: auto; }
.complex-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 620px; }
.complex-table th {
  background: #f8f9fa;
  padding: 9px 7px;
  text-align: center;
  font-weight: 700;
  color: #555;
  border-bottom: 2px solid #e0e0e0;
  white-space: nowrap;
}
.complex-table td {
  padding: 9px 7px;
  border-bottom: 1px solid #f0f0f0;
  vertical-align: middle;
}
.complex-table tr:hover td { background: #fafbff; }
.complex-table tr.row-saved td { background: #f0fff4; }

.bld-name { font-weight: 600; color: #222; font-size: 13px; }
.bld-code { font-size: 10px; color: #aaa; font-family: monospace; margin-top: 2px; }
.hh-count { text-align: center; font-weight: 700; color: #1a73e8; }

.date-btn {
  padding: 5px 8px;
  border: 1.5px solid #1a73e8;
  border-radius: 6px;
  background: white;
  color: #1a73e8;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  min-width: 82px;
  display: block;
  text-align: center;
}
.date-btn:hover { background: #1a73e8; color: white; }
.date-btn.has-date { background: #e8f0fe; }

.num-input {
  width: 50px;
  padding: 5px 3px;
  border: 1.5px solid #e0e0e0;
  border-radius: 6px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  transition: border-color 0.2s;
}
.num-input:focus { outline: none; border-color: #1a73e8; }

.memo-btn {
  padding: 5px 8px;
  border: 1.5px solid #f57c00;
  border-radius: 6px;
  background: white;
  color: #f57c00;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  display: block;
  text-align: center;
  min-width: 52px;
}
.memo-btn:hover { background: #fff3e0; }
.memo-btn.has-memo { background: #fff3e0; border-color: #f57c00; font-weight: 700; }

.save-btn {
  padding: 6px 11px;
  background: #34a853;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.18s;
  white-space: nowrap;
  display: block;
}
.save-btn:hover { opacity: 0.82; }
.save-btn.saving { opacity: 0.55; cursor: not-allowed; }

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.48);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
.overlay.show { display: flex; }

.cal-popup {
  background: white;
  border-radius: 16px;
  padding: 20px;
  width: 310px;
  max-width: 95vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.22);
}
.cal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.cal-head h3 { font-size: 15px; font-weight: 700; }
.cal-nav {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: #1a73e8;
  padding: 3px 8px;
  border-radius: 6px;
}
.cal-nav:hover { background: #e8f0fe; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-dh {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  color: #666;
  padding: 4px 0;
}
.cal-dh:first-child { color: #e53935; }
.cal-dh:last-child { color: #1565c0; }
.cal-d {
  text-align: center;
  padding: 7px 3px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.13s;
}
.cal-d:hover:not(.empty) { background: #e8f0fe; color: #1a73e8; }
.cal-d.empty { visibility: hidden; }
.cal-d.today { background: #fff3e0; color: #f57c00; font-weight: 700; }
.cal-d.sel { background: #1a73e8 !important; color: white !important; font-weight: 700; }
.cal-d.sun { color: #e53935; }
.cal-d.sat { color: #1565c0; }
.cal-actions { display: flex; gap: 9px; margin-top: 14px; }
.cal-cancel {
  flex: 1; padding: 10px; border: 1.5px solid #e0e0e0;
  border-radius: 8px; background: white; cursor: pointer;
  font-size: 14px; font-weight: 600; color: #666;
}
.cal-confirm {
  flex: 1; padding: 10px; border: none;
  border-radius: 8px; background: #1a73e8; color: white;
  cursor: pointer; font-size: 14px; font-weight: 700;
}
.cal-confirm:hover { opacity: 0.88; }

.memo-popup {
  background: white;
  border-radius: 16px;
  padding: 22px;
  width: 340px;
  max-width: 95vw;

.memo-popup .memo-sub { font-size: 12px; color: #999; margin-bottom: 12px; }

  border: 1.5px solid #e0e0e0;
  border-radius: 9px;
  font-size: 13px;
  resize: vertical;
  font-family: inherit;

.memo-cancel {
  flex: 1; padding: 10px; border: 1.5px solid #e0e0e0;
  border-radius: 8px; background: white; cursor: pointer;
  font-size: 14px; font-weight: 600; color: #666;
}
.memo-save {
  flex: 2; padding: 10px; border: none;
  border-radius: 8px; background: #f57c00; color: white;
  cursor: pointer; font-size: 14px; font-weight: 700;
}
.memo-save:hover { opacity: 0.88; }

.toast {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: #333;
  color: white;
  padding: 11px 22px;
  border-radius: 22px;
  font-size: 13px;
  font-weight: 600;
  z-index: 9999;
  transition: transform 0.28s ease;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok { background: #34a853; }
.toast.err { background: #ea4335; }

.loading-row td {
  text-align: center;
  padding: 30px;
  color: #aaa;
  font-size: 13px;
}
.spinner {
  width: 28px; height: 28px;
  border: 3px solid #e0e0e0;
  border-top-color: #1a73e8;
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 560px) {
  .screen { padding: 10px; }
  .btn-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .stat-val { font-size: 16px; }
  .complex-table { font-size: 12px; }
  .num-input { width: 42px; }
}

</head>

  <h1 id="headerTitle">📡 침투율 저조 단지 영업관리</h1>
</div>

<div class="screen active" id="screen1">
  <div class="card">
    <h2>🏢 대리점 선택</h2>
    <div class="btn-grid" id="agencyGrid"></div>
  </div>
  <div class="card" id="storeCard" style="display:none;">
    <h2>🏪 매장 선택</h2>
    <div class="btn-grid" id="storeGrid"></div>
  </div>
  <button class="proceed-btn" id="proceedBtn" disabled onclick="goToScreen2()">

  </button>
</div>

<div class="screen" id="screen2">
  <div class="selected-info" id="selInfo"></div>
  <div class="stats-bar" id="statsBar"></div>

  <div class="card" style="padding:12px;">
    <div class="table-wrapper">
      <table class="complex-table">
        <thead>
          <tr>
            <th style="text-align:left;">건물명</th>
            <th>세대수</th>
            <th>영업일정</th>
            <th>내방고객</th>   <!-- ✅ 단골 → 내방고객 -->

            <th>우양산</th>     <!-- ✅ TV → 우양산 -->
            <th>메모</th>
            <th>저장</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="overlay" id="calOverlay" onclick="calOverlayClick(event)">
  <div class="cal-popup">
    <div class="cal-head">
      <button class="cal-nav" onclick="calMove(-1)">‹</button>
      <h3 id="calTitle"></h3>
      <button class="cal-nav" onclick="calMove(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-actions">
      <button class="cal-cancel" onclick="closeCal()">취소</button>
      <button class="cal-confirm" onclick="confirmCal()">확인</button>
    </div>
  </div>
</div>

<div class="overlay" id="memoOverlay" onclick="memoOverlayClick(event)">
  <div class="memo-popup">
    <h3 id="memoTitle">메모</h3>
    <div class="memo-sub" id="memoSub"></div>
    <textarea class="memo-textarea" id="memoText" placeholder="메모를 입력하세요..." maxlength="500" oninput="updateMemoChar()"></textarea>
    <div class="memo-char"><span id="memoChar">0</span>/500</div>
    <div class="memo-actions">
      <button class="memo-cancel" onclick="closeMemo()">취소</button>
      <button class="memo-save" onclick="saveMemo()">💾 저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const agencyMap = {};
COMPLEXES.forEach(([ag, st]) => {
  if (!agencyMap[ag]) agencyMap[ag] = new Set();
  agencyMap[ag].add(st);
});

let selAgency = null, selStore = null;
let curList = [];
let dbData = {};

function initScreen1() {
  const ag = document.getElementById('agencyGrid');
  ag.innerHTML = '';
  Object.keys(agencyMap).sort().forEach(name => {
    const b = document.createElement('button');
    b.className = 'sel-btn';
    b.textContent = name;
    b.onclick = () => pickAgency(name, b);
    ag.appendChild(b);
  });
}

function pickAgency(name, btn) {
  selAgency = name; selStore = null;
  document.querySelectorAll('#agencyGrid .sel-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const sg = document.getElementById('storeGrid');
  sg.innerHTML = '';
  [...agencyMap[name]].sort().forEach(st => {
    const b = document.createElement('button');
    b.className = 'sel-btn';
    b.textContent = st;
    b.onclick = () => pickStore(st, b);
    sg.appendChild(b);
  });
  document.getElementById('storeCard').style.display = 'block';
  document.getElementById('proceedBtn').disabled = true;
}

function pickStore(name, btn) {
  selStore = name;
  document.querySelectorAll('#storeGrid .sel-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('proceedBtn').disabled = false;
}

async function goToScreen2() {
  if (!selAgency || !selStore) return;
  curList = COMPLEXES.filter(r => r[0] === selAgency && r[1] === selStore);
  document.getElementById('screen1').classList.remove('active');
  document.getElementById('screen2').classList.add('active');
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('headerTitle').textContent = `${selAgency} ${selStore}`;
  document.getElementById('selInfo').textContent =
    `📍 ${selAgency} > ${selStore}  |  총 ${curList.length}개 단지`;
  document.getElementById('searchBox').value = '';
  showLoading();
  await loadDB();
  renderTable();
  renderStats();
}

function goBack() {
  document.getElementById('screen2').classList.remove('active');
  document.getElementById('screen1').classList.add('active');
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('headerTitle').textContent = '📡 침투율 저조 단지 영업관리';
}

async function loadDB() {
  dbData = {};
  const storeName = selAgency + ' ' + selStore;
  try {
    const { data, error } = await sb
      .from('sales_records')
      .select('*')
      .eq('store_name', storeName);
    if (error) throw error;
    (data || []).forEach(r => {
      dbData[r.building_code] = {
        schedule_date: r.schedule_date || '',
        danggol: r.danggol ?? '',
        speed: r.speed ?? '',
        tv: r.tv ?? '',
        memo: r.memo || '',
        id: r.id
      };
    });
  } catch(e) {
    showToast('⚠️ 데이터 로드 실패: ' + e.message, 'err');
  }
}

async function saveRow(code) {
  const storeName = selAgency + ' ' + selStore;
  const item = curList.find(r => r[2] === code);
  if (!item) return;

  const schBtn = document.getElementById('sch_' + code);
  const scheduleDate = schBtn?.dataset.date || null;
  const danggol = parseInt(document.getElementById('dg_' + code)?.value) || 0;
  const speed   = parseInt(document.getElementById('sp_' + code)?.value) || 0;
  const tv      = parseInt(document.getElementById('tv_' + code)?.value) || 0;
  const memo    = dbData[code]?.memo || '';

  const btn = document.getElementById('sbtn_' + code);
  if (btn) { btn.classList.add('saving'); btn.textContent = '저장중...'; }

  try {
    const rec = {
      store_name: storeName,
      agency_name: selAgency,
      store_short: selStore,
      building_code: code,
      building_name: item[3],
      household_count: item[4],
      schedule_date: scheduleDate,
      danggol, speed, tv, memo,
      updated_at: new Date().toISOString()
    };
    const { error } = await sb
      .from('sales_records')
      .upsert(rec, { onConflict: 'store_name,building_code' });
    if (error) throw error;

    dbData[code] = { schedule_date: scheduleDate, danggol, speed, tv, memo };
    const row = document.getElementById('row_' + code);
    if (row) row.classList.add('row-saved');
    showToast('✅ ' + item[3] + ' 저장 완료!', 'ok');
    renderStats();
    if (btn) { btn.textContent = '수정'; btn.classList.remove('saving'); }
  } catch(e) {
    showToast('❌ 저장 실패: ' + e.message, 'err');
    if (btn) { btn.textContent = '저장'; btn.classList.remove('saving'); }
  }
}

function showLoading() {
  document.getElementById('tbody').innerHTML =
    `<tr class="loading-row"><td colspan="8"><div class="spinner"></div>데이터 불러오는 중...</td></tr>`;
}

function renderTable(filter = '') {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  const list = filter
    ? curList.filter(r => r[3].includes(filter) || r[2].includes(filter))
    : curList;

  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:28px;color:#aaa;">검색 결과 없음</td></tr>`;
    return;
  }

  list.forEach(([ag, st, code, name, cnt]) => {
    const d = dbData[code] || {};
    const hasSaved = d.schedule_date || d.danggol || d.speed || d.tv || d.memo;
    const hasMemo = !!d.memo;
    const tr = document.createElement('tr');
    tr.id = 'row_' + code;
    if (hasSaved) tr.classList.add('row-saved');

    tr.innerHTML = `
      <td>
        <div class="bld-name">${name === 'N/A' ? '(미확인)' : name}</div>
        <div class="bld-code">${code}</div>
      </td>
      <td class="hh-count">${cnt}</td>
      <td style="text-align:center;">
        <button class="date-btn ${d.schedule_date ? 'has-date' : ''}"
          id="sch_${code}" data-date="${d.schedule_date || ''}"
          onclick="openCal('${code}')">
          ${d.schedule_date ? '📅 ' + fmtDisp(d.schedule_date) : '📅 날짜선택'}
        </button>
      </td>
      <td style="text-align:center;">
        <input class="num-input" type="number" id="dg_${code}"
          value="${d.danggol ?? ''}" min="0" placeholder="0">
      </td>
      <td style="text-align:center;">
        <input class="num-input" type="number" id="sp_${code}"
          value="${d.speed ?? ''}" min="0" placeholder="0">
      </td>
      <td style="text-align:center;">
        <input class="num-input" type="number" id="tv_${code}"
          value="${d.tv ?? ''}" min="0" placeholder="0">
      </td>
      <td style="text-align:center;">
        <button class="memo-btn ${hasMemo ? 'has-memo' : ''}"
          id="mbtn_${code}" onclick="openMemo('${code}')">
          ${hasMemo ? '📝 있음' : '📝 메모'}
        </button>
      </td>
      <td style="text-align:center;">
        <button class="save-btn" id="sbtn_${code}" onclick="saveRow('${code}')">
          ${hasSaved ? '수정' : '저장'}
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function filterTable() {
  renderTable(document.getElementById('searchBox').value.trim());
}

function renderStats() {
  const codes = curList.map(r => r[2]);
  const saved = codes.filter(c => {
    const d = dbData[c];
    return d && (d.schedule_date || d.danggol || d.speed || d.tv);
  }).length;
  const dg = codes.reduce((s, c) => s + (parseInt(dbData[c]?.danggol) || 0), 0);
  const sp = codes.reduce((s, c) => s + (parseInt(dbData[c]?.speed) || 0), 0);
  const tv = codes.reduce((s, c) => s + (parseInt(dbData[c]?.tv) || 0), 0);
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item">
      <div class="stat-val">${saved}/${curList.length}</div>
      <div class="stat-label">입력 단지</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" style="color:#ea4335;">${dg}</div>
      <div class="stat-label">내방고객 합계</div>  <!-- ✅ 변경 -->
    </div>
    <div class="stat-item">
      <div class="stat-val" style="color:#34a853;">${sp}</div>
      <div class="stat-label">필름교체 합계</div>  <!-- ✅ 변경 -->
    </div>
    <div class="stat-item">
      <div class="stat-val" style="color:#f57c00;">${tv}</div>
      <div class="stat-label">우양산 합계</div>    <!-- ✅ 변경 -->
    </div>
  `;
}

let calCode = null, calY, calM, calSel;

function openCal(code) {
  calCode = code;
  const btn = document.getElementById('sch_' + code);
  const ex = btn?.dataset.date;
  const now = new Date();
  if (ex) { const d = new Date(ex); calY = d.getFullYear(); calM = d.getMonth(); calSel = ex; }
  else { calY = now.getFullYear(); calM = now.getMonth(); calSel = null; }
  drawCal();
  document.getElementById('calOverlay').classList.add('show');
}

function closeCal() {
  document.getElementById('calOverlay').classList.remove('show');
  calCode = null; calSel = null;
}

function calOverlayClick(e) {
  if (e.target === document.getElementById('calOverlay')) closeCal();
}

function calMove(d) {
  calM += d;
  if (calM > 11) { calM = 0; calY++; }
  if (calM < 0) { calM = 11; calY--; }
  drawCal();
}

function drawCal() {
  const MN = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent = `${calY}년 ${MN[calM]}`;
  const g = document.getElementById('calGrid');
  g.innerHTML = '';
  ['일','월','화','수','목','금','토'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dh';
    el.textContent = d;
    g.appendChild(el);
  });
  const first = new Date(calY, calM, 1).getDay();
  const days = new Date(calY, calM + 1, 0).getDate();
  const todayStr = fmtDate(new Date());
  for (let i = 0; i < first; i++) {
    const el = document.createElement('div'); el.className = 'cal-d empty'; g.appendChild(el);
  }
  for (let d = 1; d <= days; d++) {
    const ds = `${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(calY, calM, d).getDay();
    const el = document.createElement('div');
    let cls = 'cal-d';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (ds === todayStr) cls += ' today';
    if (ds === calSel) cls += ' sel';
    el.className = cls;
    el.textContent = d;
    el.onclick = () => {
      calSel = ds;
      document.querySelectorAll('.cal-d.sel').forEach(e => e.classList.remove('sel'));
      el.classList.add('sel');
    };
    g.appendChild(el);
  }
}

function confirmCal() {
  if (!calSel || !calCode) { closeCal(); return; }
  const btn = document.getElementById('sch_' + calCode);
  if (btn) {
    btn.dataset.date = calSel;
    btn.textContent = '📅 ' + fmtDisp(calSel);
    btn.classList.add('has-date');
  }
  closeCal();
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDisp(s) {
  if (!s) return '';
  const [y, m, d] = s.split('-');
  return `${m}/${d}`;
}

let memoCode = null;

function openMemo(code) {
  memoCode = code;
  const item = curList.find(r => r[2] === code);
  const name = item ? (item[3] === 'N/A' ? '(미확인)' : item[3]) : code;
  document.getElementById('memoTitle').textContent = '📝 ' + name;
  document.getElementById('memoSub').textContent = code;
  const txt = dbData[code]?.memo || '';
  document.getElementById('memoText').value = txt;
  document.getElementById('memoChar').textContent = txt.length;
  document.getElementById('memoOverlay').classList.add('show');
  setTimeout(() => document.getElementById('memoText').focus(), 100);
}

function closeMemo() {
  document.getElementById('memoOverlay').classList.remove('show');
  memoCode = null;
}

function memoOverlayClick(e) {
  if (e.target === document.getElementById('memoOverlay')) closeMemo();
}

function updateMemoChar() {
  document.getElementById('memoChar').textContent = document.getElementById('memoText').value.length;
}

async function saveMemo() {
  if (!memoCode) return;
  const memo = document.getElementById('memoText').value.trim();
  const storeName = selAgency + ' ' + selStore;
  const item = curList.find(r => r[2] === memoCode);

  try {
    const rec = {
      store_name: storeName,
      agency_name: selAgency,
      store_short: selStore,
      building_code: memoCode,
      building_name: item ? item[3] : '',
      household_count: item ? item[4] : 0,
      schedule_date: dbData[memoCode]?.schedule_date || null,
      danggol: parseInt(document.getElementById('dg_' + memoCode)?.value) || 0,
      speed:   parseInt(document.getElementById('sp_' + memoCode)?.value) || 0,
      tv:      parseInt(document.getElementById('tv_' + memoCode)?.value) || 0,
      memo,
      updated_at: new Date().toISOString()
    };
    const { error } = await sb
      .from('sales_records')
      .upsert(rec, { onConflict: 'store_name,building_code' });
    if (error) throw error;

    if (!dbData[memoCode]) dbData[memoCode] = {};
    dbData[memoCode].memo = memo;

    const mbtn = document.getElementById('mbtn_' + memoCode);
    if (mbtn) {
      if (memo) { mbtn.classList.add('has-memo'); mbtn.textContent = '📝 있음'; }
      else { mbtn.classList.remove('has-memo'); mbtn.textContent = '📝 메모'; }
    }
    showToast('✅ 메모 저장 완료!', 'ok');
    closeMemo();
  } catch(e) {
    showToast('❌ 메모 저장 실패: ' + e.message, 'err');
  }
}

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

initScreen1();
</script>
