<html lang="ko">

<title>침투율 저조 단지 영업관리</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f0f4f8; color: #333; min-height: 100vh; }
  
  /* 헤더 */
  .header {
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 17px; font-weight: 700; }
  .back-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: none;
  }
  .back-btn:hover { background: rgba(255,255,255,0.3); }

  /* 화면 전환 */
  .screen { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
  .screen.active { display: block; }

  /* 카드 */
  .card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .card h2 { font-size: 16px; color: #1a73e8; margin-bottom: 16px; font-weight: 700; }

  /* 선택 버튼 그룹 */
  .select-group { margin-bottom: 20px; }
  .select-group label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 600; }
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }
  .select-btn {
    padding: 12px 10px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    transition: all 0.2s;
    text-align: center;
  }
  .select-btn:hover { border-color: #1a73e8; color: #1a73e8; background: #e8f0fe; }
  .select-btn.active { border-color: #1a73e8; background: #1a73e8; color: white; }

  /* 진행 버튼 */
  .proceed-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
    transition: opacity 0.2s;
  }
  .proceed-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .proceed-btn:not(:disabled):hover { opacity: 0.9; }

  /* 선택 정보 표시 */
  .selected-info {
    background: #e8f0fe;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #1a73e8;
    font-weight: 600;
    margin-bottom: 16px;
  }

  /* 단지 테이블 */
  .complex-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .complex-table th {
    background: #f8f9fa;
    padding: 10px 8px;
    text-align: center;
    font-weight: 700;
    color: #555;
    border-bottom: 2px solid #e0e0e0;
    white-space: nowrap;
  }
  .complex-table td {
    padding: 10px 8px;
    border-bottom: 1px solid #f0f0f0;
    vertical-align: middle;
  }
  .complex-table tr:hover td { background: #fafbff; }
  .complex-table tr.saved td { background: #f0fff4; }

  /* 건물코드 */
  .building-code { font-size: 11px; color: #999; font-family: monospace; }
  .building-name { font-weight: 600; color: #333; }
  .household { text-align: center; font-weight: 600; color: #1a73e8; }

  /* 날짜 버튼 */
  .date-btn {
    padding: 6px 10px;
    border: 1.5px solid #1a73e8;
    border-radius: 6px;
    background: white;
    color: #1a73e8;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    min-width: 90px;
  }
  .date-btn:hover { background: #1a73e8; color: white; }
  .date-btn.has-date { background: #e8f0fe; border-color: #1a73e8; }

  /* 실적 입력 */
  .result-input {
    width: 52px;
    padding: 6px 4px;
    border: 1.5px solid #e0e0e0;
    border-radius: 6px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    transition: border-color 0.2s;
  }
  .result-input:focus { outline: none; border-color: #1a73e8; }

  /* 저장 버튼 */
  .save-btn {
    padding: 6px 12px;
    background: #34a853;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .save-btn:hover { opacity: 0.85; }
  .save-btn.saving { opacity: 0.6; cursor: not-allowed; }

  /* 저장 완료 뱃지 */
  .saved-badge {
    display: inline-block;
    padding: 3px 8px;
    background: #34a853;
    color: white;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }

  /* 달력 팝업 */
  .calendar-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .calendar-overlay.show { display: flex; }
  .calendar-popup {
    background: white;
    border-radius: 16px;
    padding: 20px;
    width: 320px;
    max-width: 95vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-header h3 { font-size: 16px; font-weight: 700; color: #333; }
  .cal-nav {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: #1a73e8;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .cal-nav:hover { background: #e8f0fe; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day-header {
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    color: #666;
    padding: 4px 0;
  }
  .cal-day-header:first-child { color: #e53935; }
  .cal-day-header:last-child { color: #1a73e8; }
  .cal-day {
    text-align: center;
    padding: 8px 4px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .cal-day:hover:not(.empty):not(.other-month) { background: #e8f0fe; color: #1a73e8; }
  .cal-day.today { background: #fff3e0; color: #f57c00; font-weight: 700; }
  .cal-day.selected { background: #1a73e8; color: white; font-weight: 700; }
  .cal-day.empty, .cal-day.other-month { color: #ccc; cursor: default; }
  .cal-day.sunday { color: #e53935; }
  .cal-day.saturday { color: #1a73e8; }
  .cal-day.selected.sunday, .cal-day.selected.saturday { color: white; }
  .cal-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .cal-cancel {
    flex: 1;
    padding: 10px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    background: white;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: #666;
  }
  .cal-confirm {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #1a73e8;
    color: white;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
  }
  .cal-confirm:hover { opacity: 0.9; }

  /* 로딩 */
  .loading {
    text-align: center;
    padding: 40px;
    color: #999;
    font-size: 14px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #e0e0e0;
    border-top-color: #1a73e8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #333;
    color: white;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    z-index: 9999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #34a853; }
  .toast.error { background: #ea4335; }

  /* 반응형 */
  @media (max-width: 600px) {
    .screen { padding: 12px; }
    .btn-grid { grid-template-columns: repeat(2, 1fr); }
    .complex-table { font-size: 12px; }
    .result-input { width: 44px; font-size: 12px; }
    .date-btn { min-width: 80px; font-size: 11px; padding: 5px 6px; }
    .complex-table th, .complex-table td { padding: 8px 4px; }
  }

  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-item {
    background: white;
    border-radius: 10px;
    padding: 10px 16px;
    flex: 1;
    min-width: 80px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  .stat-item .stat-val { font-size: 20px; font-weight: 700; color: #1a73e8; }
  .stat-item .stat-label { font-size: 11px; color: #888; margin-top: 2px; }

  /* 검색 */
  .search-box {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .search-box:focus { outline: none; border-color: #1a73e8; }

  /* 테이블 래퍼 */
  .table-wrapper { overflow-x: auto; }
</style>
</head>

</div>

<!-- 달력 팝업 -->

</div>

const agencyMap = {};
RAW_DATA.forEach(([store, code, name, cnt]) => {
  const parts = store.split(' ');
  const storeName = parts[parts.length - 1];
  const agencyName = parts.slice(0, parts.length - 1).join(' ');
  if (!agencyMap[agencyName]) agencyMap[agencyName] = {};
  if (!agencyMap[agencyName][storeName]) agencyMap[agencyName][storeName] = [];
  agencyMap[agencyName][storeName].push({ store, code, name, cnt });
});

let selectedAgency = null;
let selectedStore = null;
let currentComplexes = [];
let savedData = {}; // { code: { schedule, danggol, speed, tv } }

// ==================== 화면 1: 대리점/매장 선택 ====================
function initScreen1() {
  const agencyGrid = document.getElementById('agencyGrid');
  agencyGrid.innerHTML = '';
  Object.keys(agencyMap).sort().forEach(agency => {
    const btn = document.createElement('button');
    btn.className = 'select-btn';
    btn.textContent = agency;
    btn.onclick = () => selectAgency(agency, btn);
    agencyGrid.appendChild(btn);
  });
}

function selectAgency(agency, btn) {
  selectedAgency = agency;
  selectedStore = null;
  document.querySelectorAll('#agencyGrid .select-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  const storeCard = document.getElementById('storeCard');
  const storeGrid = document.getElementById('storeGrid');
  storeCard.style.display = 'block';
  storeGrid.innerHTML = '';
  
  Object.keys(agencyMap[agency]).sort().forEach(store => {
    const btn2 = document.createElement('button');
    btn2.className = 'select-btn';
    btn2.textContent = store;
    btn2.onclick = () => selectStore(store, btn2);
    storeGrid.appendChild(btn2);
  });
  
  document.getElementById('proceedBtn').disabled = true;
}

function selectStore(store, btn) {
  selectedStore = store;
  document.querySelectorAll('#storeGrid .select-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('proceedBtn').disabled = false;
}

async function goToScreen2() {
  if (!selectedAgency || !selectedStore) return;
  
  const fullStoreName = selectedAgency + ' ' + selectedStore;
  currentComplexes = agencyMap[selectedAgency][selectedStore];
  
  document.getElementById('screen1').classList.remove('active');
  document.getElementById('screen2').classList.add('active');
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('headerTitle').textContent = fullStoreName;
  document.getElementById('selectedInfo').textContent = 
    `📍 ${selectedAgency} > ${selectedStore} | 총 ${currentComplexes.length}개 단지`;
  
  // DB에서 기존 데이터 로드
  await loadSavedData(fullStoreName);
  renderTable();
  renderStats();
}

function goBack() {
  document.getElementById('screen2').classList.remove('active');
  document.getElementById('screen1').classList.add('active');
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('headerTitle').textContent = '📡 침투율 저조 단지 영업관리';
  document.getElementById('searchBox').value = '';
}

async function ensureTable() {

  // 여기서는 upsert로 처리
}

async function loadSavedData(storeName) {
  savedData = {};
  try {
    const { data, error } = await supabase
      .from('sales_records')
      .select('*')
      .eq('store_name', storeName);
    
    if (error) {
      if (error.code === '42P01') {
        // 테이블 없음 - 무시하고 빈 데이터로 진행
        console.warn('테이블이 없습니다. Supabase에서 테이블을 생성해주세요.');
        showToast('⚠️ DB 테이블을 먼저 생성해주세요', 'error');
      }
      return;
    }
    
    if (data) {
      data.forEach(row => {
        savedData[row.building_code] = {
          schedule: row.schedule_date,
          danggol: row.danggol,
          speed: row.speed,
          tv: row.tv,
          id: row.id
        };
      });
    }
  } catch(e) {
    console.error('데이터 로드 오류:', e);
  }
}

async function saveRecord(code) {
  const fullStoreName = selectedAgency + ' ' + selectedStore;
  const complex = currentComplexes.find(c => c.code === code);
  if (!complex) return;

  const scheduleVal = document.getElementById(`sch_${code}`)?.dataset.date || null;
  const danggolVal = parseInt(document.getElementById(`dg_${code}`)?.value) || 0;
  const speedVal = parseInt(document.getElementById(`sp_${code}`)?.value) || 0;
  const tvVal = parseInt(document.getElementById(`tv_${code}`)?.value) || 0;

  const saveBtn = document.getElementById(`savebtn_${code}`);
  if (saveBtn) { saveBtn.classList.add('saving'); saveBtn.textContent = '저장중...'; }

  try {
    const record = {
      store_name: fullStoreName,
      agency_name: selectedAgency,
      store_short: selectedStore,
      building_code: code,
      building_name: complex.name,
      household_count: complex.cnt,
      schedule_date: scheduleVal,
      danggol: danggolVal,
      speed: speedVal,
      tv: tvVal,
      updated_at: new Date().toISOString()
    };

    const { data, error } = await supabase
      .from('sales_records')
      .upsert(record, { onConflict: 'store_name,building_code' })
      .select();

    if (error) throw error;

    savedData[code] = { schedule: scheduleVal, danggol: danggolVal, speed: speedVal, tv: tvVal };
    
    // 행 하이라이트
    const row = document.getElementById(`row_${code}`);
    if (row) row.classList.add('saved');
    
    if (saveBtn) {
      saveBtn.textContent = '✓ 저장됨';
      saveBtn.style.background = '#1a73e8';
      setTimeout(() => {
        if (saveBtn) { saveBtn.textContent = '저장'; saveBtn.style.background = '#34a853'; saveBtn.classList.remove('saving'); }
      }, 2000);
    }
    
    showToast(`✅ ${complex.name} 저장 완료!`, 'success');
    renderStats();
    
  } catch(e) {
    console.error('저장 오류:', e);
    showToast(`❌ 저장 실패: ${e.message}`, 'error');
    if (saveBtn) { saveBtn.classList.remove('saving'); saveBtn.textContent = '저장'; }
  }
}

// ==================== 테이블 렌더링 ====================
function renderTable(filter = '') {
  const tbody = document.getElementById('complexTbody');
  tbody.innerHTML = '';
  
  const filtered = filter 
    ? currentComplexes.filter(c => c.name.includes(filter) || c.code.includes(filter))
    : currentComplexes;
  
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:#999;">검색 결과가 없습니다</td></tr>';
    return;
  }

  filtered.forEach(({ code, name, cnt }) => {
    const saved = savedData[code] || {};
    const hasSaved = !!saved.schedule || saved.danggol || saved.speed || saved.tv;
    
    const tr = document.createElement('tr');
    tr.id = `row_${code}`;
    if (hasSaved) tr.classList.add('saved');
    
    const scheduleDate = saved.schedule || '';
    const danggol = saved.danggol || '';
    const speed = saved.speed || '';
    const tv = saved.tv || '';
    
    tr.innerHTML = `
      <td>
        <div class="building-name">${name === 'N/A' ? '(미확인)' : name}</div>
        <div class="building-code">${code}</div>
      </td>
      <td class="household">${cnt}</td>
      <td style="text-align:center;">
        <button class="date-btn ${scheduleDate ? 'has-date' : ''}" 
          id="sch_${code}" 
          data-date="${scheduleDate}"
          onclick="openCalendar('${code}')">
          ${scheduleDate ? formatDateDisplay(scheduleDate) : '📅 날짜선택'}
        </button>
      </td>
      <td style="text-align:center;">
        <input type="number" class="result-input" id="dg_${code}" 
          value="${danggol}" min="0" placeholder="0"
          onchange="markChanged('${code}')">
      </td>
      <td style="text-align:center;">
        <input type="number" class="result-input" id="sp_${code}" 
          value="${speed}" min="0" placeholder="0"
          onchange="markChanged('${code}')">
      </td>
      <td style="text-align:center;">
        <input type="number" class="result-input" id="tv_${code}" 
          value="${tv}" min="0" placeholder="0"
          onchange="markChanged('${code}')">
      </td>
      <td style="text-align:center;">
        <button class="save-btn" id="savebtn_${code}" onclick="saveRecord('${code}')">
          ${hasSaved ? '수정' : '저장'}
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function markChanged(code) {
  const btn = document.getElementById(`savebtn_${code}`);
  if (btn) { btn.textContent = '저장'; btn.style.background = '#34a853'; }
}

function filterTable() {
  const val = document.getElementById('searchBox').value.trim();
  renderTable(val);
}

// ==================== 통계 ====================
function renderStats() {
  const total = currentComplexes.length;
  const savedCount = Object.keys(savedData).filter(k => 
    currentComplexes.some(c => c.code === k)
  ).length;
  const totalDanggol = Object.values(savedData).reduce((s, d) => s + (d.danggol || 0), 0);
  const totalSpeed = Object.values(savedData).reduce((s, d) => s + (d.speed || 0), 0);
  const totalTv = Object.values(savedData).reduce((s, d) => s + (d.tv || 0), 0);
  
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item">
      <div class="stat-val">${savedCount}/${total}</div>
      <div class="stat-label">입력 단지</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" style="color:#ea4335;">${totalDanggol}</div>
      <div class="stat-label">단골 합계</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" style="color:#34a853;">${totalSpeed}</div>
      <div class="stat-label">초고속 합계</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" style="color:#f57c00;">${totalTv}</div>
      <div class="stat-label">TV 합계</div>
    </div>
  `;
}

// ==================== 달력 ====================
function openCalendar(code) {
  calTargetCode = code;
  const btn = document.getElementById(`sch_${code}`);
  const existingDate = btn?.dataset.date;
  
  const today = new Date();
  if (existingDate) {
    const d = new Date(existingDate);
    calYear = d.getFullYear();
    calMonth = d.getMonth();
    calSelectedDate = existingDate;
  } else {
    calYear = today.getFullYear();
    calMonth = today.getMonth();
    calSelectedDate = null;
  }
  
  renderCalendar();
  document.getElementById('calendarOverlay').classList.add('show');
}

function closeCalendar() {
  document.getElementById('calendarOverlay').classList.remove('show');
  calTargetCode = null;
  calSelectedDate = null;
}

function closeCalendarOnOverlay(e) {
  if (e.target === document.getElementById('calendarOverlay')) closeCalendar();
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent = `${calYear}년 ${months[calMonth]}`;
  
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  
  // 요일 헤더
  ['일','월','화','수','목','금','토'].forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'cal-day-header';
    el.textContent = d;
    grid.appendChild(el);
  });
  
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date();
  const todayStr = formatDate(today.getFullYear(), today.getMonth(), today.getDate());
  
  // 빈 칸
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }
  
  // 날짜
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    const dateStr = formatDate(calYear, calMonth, d);
    const dayOfWeek = new Date(calYear, calMonth, d).getDay();
    
    let cls = 'cal-day';
    if (dayOfWeek === 0) cls += ' sunday';
    if (dayOfWeek === 6) cls += ' saturday';
    if (dateStr === todayStr) cls += ' today';
    if (dateStr === calSelectedDate) cls += ' selected';
    
    el.className = cls;
    el.textContent = d;
    el.onclick = () => selectCalDay(dateStr, el);
    grid.appendChild(el);
  }
}

function selectCalDay(dateStr, el) {
  calSelectedDate = dateStr;
  document.querySelectorAll('.cal-day.selected').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

function confirmDate() {
  if (!calSelectedDate || !calTargetCode) { closeCalendar(); return; }
  
  const btn = document.getElementById(`sch_${calTargetCode}`);
  if (btn) {
    btn.dataset.date = calSelectedDate;
    btn.textContent = formatDateDisplay(calSelectedDate);
    btn.classList.add('has-date');
    markChanged(calTargetCode);
  }
  closeCalendar();
}

function formatDate(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function formatDateDisplay(dateStr) {
  if (!dateStr) return '📅 날짜선택';
  const [y, m, d] = dateStr.split('-');
  return `📅 ${m}/${d}`;
}

// ==================== 토스트 ====================
function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ==================== 초기화 ====================
initScreen1();
